version: '3.8'

services:
  app:
    build: .
    ports:
      - "5050:5050"
    environment:
      - MONGO_USER=admin
      - MONGO_PASS=qwerty
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=apnacollege-db
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=qwerty
    volumes:
      - /Users/abhijayhome/Desktop/data:/data/db

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8082:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=qwerty
      - ME_CONFIG_MONGODB_URL=mongodb://admin:qwerty@mongodb:27017/
    depends_on:
      - mongodb

volumes:
  mongodb_data:
